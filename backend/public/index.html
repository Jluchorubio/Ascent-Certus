<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ascent Certus</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: "Sora", system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at top, #1c2433, #0f131b);
        color: #eef2ff;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        background: rgba(15, 19, 27, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 32px 36px;
        max-width: 520px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 2rem;
      }
      p {
        margin: 0 0 16px;
        color: #cbd5f5;
      }
      a {
        color: #93c5fd;
        text-decoration: none;
        font-weight: 600;
      }
      a:hover {
        text-decoration: underline;
      }
      .links {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Ascent Certus</h1>
      <p>Backend activo y API versionada.</p>
      <div class="links">
        <a href="/api/v1">Ver rutas v1</a>
        <a href="/health">Health</a>
      </div>
    </main>
  </body>
</html>
